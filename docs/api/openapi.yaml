  # ── oEmbed ────────────────────────────────────────────────────────────

  /wp-json/wp-super-gallery/v1/oembed:
    get:
      operationId: proxyOembed
      tags: [Media]
      summary: oEmbed proxy
      description: |
        Proxies an oEmbed discovery request via the server to bypass CORS.
        Public and rate-limited. SSRF mitigations applied: HTTPS-only,
        RFC-1918 IP blocking, optional provider allowlist.
      security:
        - {}
      parameters:
        - in: query
          name: url
          required: true
          schema:
            type: string
            format: uri
          description: The media URL to resolve via oEmbed
      responses:
        '200':
          description: oEmbed response data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OembedResponse'
        '400':
          description: Missing or non-HTTPS URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: oEmbed provider returned no usable data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

