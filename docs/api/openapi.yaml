  # ── Campaign Access ───────────────────────────────────────────────────

  /wp-json/wp-super-gallery/v1/campaigns/{id}/access:
    parameters:
      - in: path
        name: id
        required: true
        description: Campaign post ID
        schema:
          type: integer
    get:
      operationId: listCampaignAccess
      tags: [Access]
      summary: List campaign access grants
      security:
        - bearerAuth: []
        - cookieNonce: []
      parameters:
        - in: query
          name: include_expired
          required: false
          schema:
            type: boolean
            default: false
          description: "P28-B: When true, includes grants whose expires_at is in the past. Expired grants are hidden by default."
      responses:
        '200':
          description: Access grants for this campaign
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessGrant'
                  total:
                    type: integer
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: grantCampaignAccess
      tags: [Access]
      summary: Grant or deny campaign access
      description: |
        Grants (or denies) access for a user to a campaign or its parent company.
        `userId` is required. `source` controls whether the grant is campaign-scoped
        or company-wide. `expires_at` (P28-B) sets an optional expiry after which the
        grant is treated as expired and hidden from the default list.
      security:
        - bearerAuth: []
        - cookieNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, source]
              properties:
                userId:
                  type: integer
                  description: WordPress user ID to grant/deny access for.
                  example: 7
                source:
                  type: string
                  enum: [campaign, company]
                  description: "'campaign' scopes to this campaign; 'company' grants across all campaigns under the same company."
                  example: campaign
                action:
                  type: string
                  enum: [grant, deny]
                  default: grant
                  description: "'grant' adds the user; 'deny' adds an override that blocks company-level access. Ignored when source=company."
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: "P28-B: Optional ISO 8601 expiry. Null or omitted = permanent grant. Must be a parseable datetime string."
                  example: "2026-12-31T23:59:59Z"
      responses:
        '200':
          description: Access updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Access updated
        '400':
          description: Missing userId, invalid source, or unparseable expires_at
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wp-json/wp-super-gallery/v1/campaigns/{id}/access/{userId}:
    delete:
      operationId: revokeCampaignAccess
      tags: [Access]
      summary: Revoke campaign access
      security:
        - bearerAuth: []
        - cookieNonce: []
      parameters:
        - in: path
          name: id
          required: true
          description: Campaign post ID
          schema:
            type: integer
        - in: path
          name: userId
          required: true
          description: WordPress user ID whose access is being revoked
          schema:
            type: integer
      responses:
        '200':
          description: Access revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Access revoked
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign or grant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wp-json/wp-super-gallery/v1/campaigns/{id}/access-requests:
    parameters:
      - in: path
        name: id
        required: true
        description: Campaign post ID
        schema:
          type: integer
    post:
      operationId: submitAccessRequest
      tags: [Access]
      summary: Submit access request (public)
      description: Allows an unauthenticated visitor to request access. Rate-limited via rate_limit_public.
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                message:
                  type: string
      responses:
        '201':
          description: Request submitted
          content:
            application/json:
              schema:
                type: object
                required: [token, status, message]
                properties:
                  token:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [pending]
                  message:
                    type: string
                    example: Your request has been submitted
        '400':
          description: Missing or invalid email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Email already has access or a pending request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: listAccessRequests
      tags: [Access]
      summary: List access requests (admin)
      security:
        - bearerAuth: []
        - cookieNonce: []
      responses:
        '200':
          description: Access requests for this campaign
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessRequest'
                  total:
                    type: integer
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wp-json/wp-super-gallery/v1/campaigns/{id}/access-requests/{token}/approve:
    post:
      operationId: approveAccessRequest
      tags: [Access]
      summary: Approve access request
      description: |
        Approves a pending access request and creates an AccessGrant.
        Accepts an optional magic_key query parameter for one-click approval
        from the admin notification email (no session required when valid).
      security:
        - bearerAuth: []
        - cookieNonce: []
      parameters:
        - in: path
          name: id
          required: true
          description: Campaign post ID
          schema:
            type: integer
        - in: path
          name: token
          required: true
          description: UUID v4 token from the access request
          schema:
            type: string
            format: uuid
        - in: query
          name: magic_key
          schema:
            type: string
          description: HMAC-SHA256 token from admin notification email (TTL 48h, single-use)
      responses:
        '200':
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                required: [message, grant]
                properties:
                  message:
                    type: string
                    example: Access request approved
                  grant:
                    $ref: '#/components/schemas/AccessGrant'
        '401':
          description: Not authenticated and no valid magic_key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: magic_key invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign or token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Request already approved or denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wp-json/wp-super-gallery/v1/campaigns/{id}/access-requests/{token}/deny:
    post:
      operationId: denyAccessRequest
      tags: [Access]
      summary: Deny access request
      security:
        - bearerAuth: []
        - cookieNonce: []
      parameters:
        - in: path
          name: id
          required: true
          description: Campaign post ID
          schema:
            type: integer
        - in: path
          name: token
          required: true
          description: UUID v4 token from the access request
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Request denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Access request denied
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign or token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Request already decided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Campaign Audit Log ────────────────────────────────────────────────

  /wp-json/wp-super-gallery/v1/campaigns/{id}/audit:
    get:
      operationId: listCampaignAudit
      tags: [Campaigns]
      summary: List campaign audit log
      description: |
        Returns the chronological audit log for a campaign. Each entry records
        a state-change event with the acting user and a data payload.
      security:
        - bearerAuth: []
        - cookieNonce: []
      parameters:
        - in: path
          name: id
          required: true
          description: Campaign post ID
          schema:
            type: integer
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Filter entries on or after this ISO date (YYYY-MM-DD)
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Filter entries on or before this ISO date
        - in: query
          name: action
          schema:
            type: string
          description: Filter by action string (e.g. media.added)
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, per_page]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
