        '200':
          description: Layout template list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/LayoutTemplate'
                  total:
                    type: integer
        '401':
          description: Not authenticated
