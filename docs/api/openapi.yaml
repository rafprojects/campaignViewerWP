            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createLayoutTemplate
      tags: [LayoutTemplates]
      summary: Create layout template
      security:
        - bearerAuth: []
        - cookieNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: My Custom Grid
                slots:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  nullable: true
                preset:
                  type: string
                  description: Optional preset key to initialise the template from
                  example: three-column
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutTemplate'
        '400':
          description: Missing name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
