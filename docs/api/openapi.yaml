openapi: 3.0.3
info:
  title: WP Super Gallery API
  version: "0.24.0"
  license:
    name: GPL-2.0-or-later
    url: https://www.gnu.org/licenses/gpl-2.0.html
  description: |
    OpenAPI 3.0.3 description of all `wp-super-gallery/v1` REST endpoints
    used by the admin SPA and public site.

    ## Authentication

    Most write endpoints and all admin read endpoints require one of:
    - **bearerAuth** — `Authorization: Bearer <jwt>` header (JWT issued by
      `POST /auth/login` or a compatible JWT plugin)
    - **cookieNonce** — `X-WP-Nonce: <nonce>` header obtained from the login
      response or `GET /nonce`

    Public read endpoints and event-recording endpoints use no authentication.
servers:
  - url: https://{site_base}
    variables:
      site_base:
        default: example.com
        description: Replace with your site host (no trailing slash)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /auth/login
    cookieNonce:
      type: apiKey
      in: header
      name: X-WP-Nonce
      description: WordPress REST nonce; obtain from login response or GET /nonce

  schemas:

    Error:
      type: object
      description: Standard error response body returned for 4xx and 5xx responses.
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: rest_forbidden
        message:
          type: string
          description: Human-readable description of the error
          example: Sorry, you are not allowed to do that.
        data:
          type: object
          description: Optional additional context (e.g. per-field validation errors)
          additionalProperties: true

    Campaign:
      type: object
      description: A WP Super Gallery campaign (gallery instance).
      required: [id, title]
      properties:
        id:
          type: integer
          description: WordPress post ID
          example: 42
        title:
          type: string
          description: Campaign title
          example: Summer 2026 Product Launch
        description:
          type: string
          nullable: true
          description: Optional campaign description / excerpt
          example: A showcase of the Q3 product line.
        slug:
          type: string
          description: URL-safe post slug
          example: summer-2026-product-launch
        status:
          type: string
          enum: [publish, draft, archived]
          description: WordPress post status (archived maps to the custom status)
          example: publish
        visibility:
          type: string
          enum: [public, private, password]
          description: WP post visibility setting
          example: public
        company_id:
          type: string
          nullable: true
          description: Slug of the owning Company, if assigned
          example: acme-corp
        template_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the linked LayoutTemplate
          example: 3f2504e0-4f89-11d3-9a0c-0305e82c3301
        categories:
          type: array
          items:
            type: integer
          description: WordPress term IDs for campaign-categories taxonomy
          example: [1, 3]
        tags:
          type: array
          items:
            type: integer
          description: WordPress term IDs for campaign-tags taxonomy
          example: [5]
        media_count:
          type: integer
          description: Number of media items currently attached to this campaign
          example: 12
        settings_override:
          type: object
          description: Per-campaign settings that override global defaults
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
          example: "2026-01-15T09:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 last-modified timestamp
          example: "2026-04-20T14:30:00Z"

    CampaignCreate:
      type: object
      description: Request body for creating a new campaign.
      required: [title]
      properties:
        title:
          type: string
          description: Campaign title (required)
          example: New Campaign
        description:
          type: string
          description: Optional campaign description
        visibility:
          type: string
          enum: [public, private, password]
          default: public
        company_id:
          type: string
          description: Company slug to associate with this campaign
          nullable: true
        template_id:
          type: string
          format: uuid
          description: UUID of a LayoutTemplate to link
          nullable: true
        settings_override:
          type: object
          additionalProperties: true
          nullable: true

    CampaignUpdate:
      type: object
      description: Request body for updating an existing campaign. All fields are optional.
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [public, private, password]
        company_id:
          type: string
          nullable: true
        template_id:
          type: string
          format: uuid
          nullable: true
        settings_override:
          type: object
          additionalProperties: true
          nullable: true

    PaginatedCampaigns:
      type: object
      description: Paginated list of campaigns.
      required: [items, page, per_page, total, total_pages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Campaign'
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        total_pages:
          type: integer
          example: 5

    MediaItem:
      type: object
      description: A single media item attached to a campaign.
      required: [id, url, type, source]
      properties:
        id:
          type: string
          description: Unique string identifier for this media item
          example: abc123.jpg
        url:
          type: string
          format: uri
          description: Full URL to the media asset
          example: https://example.com/wp-content/uploads/2026/01/photo.jpg
        type:
          type: string
          enum: [image, video, oembed, external]
          description: Media type
          example: image
        source:
          type: string
          enum: [upload, external]
          description: Whether the asset is a WP upload or an external URL
          example: upload
        caption:
          type: string
          nullable: true
          description: Optional caption text
          example: A beautiful sunrise over the mountains
        order:
          type: integer
          description: Display order within the campaign (0-indexed)
          example: 0
        thumbnail:
          type: string
          format: uri
          nullable: true
          description: URL of a thumbnail image
          example: https://example.com/wp-content/uploads/2026/01/photo-150x150.jpg
        attachment_id:
          type: integer
          nullable: true
          description: WordPress attachment post ID (null for external/oembed items)
          example: 123
        created_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when this item was added to the campaign
          example: "2026-02-01T10:00:00Z"

    MediaItemUpdate:
      type: object
      description: Fields that can be updated on an existing media item.
      properties:
        caption:
          type: string
          nullable: true
          description: New caption text
        order:
          type: integer
          description: New display order position
        thumbnail:
          type: string
          format: uri
          nullable: true
          description: New thumbnail URL

    AccessGrant:
      type: object
      description: A user-level access grant for a campaign or company.
      required: [user_id, user_login, user_email, granted_at]
      properties:
        campaign_id:
          type: integer
          nullable: true
          description: Campaign post ID (null for company-level grants)
          example: 42
        user_id:
          type: integer
          description: WordPress user ID
          example: 7
        user_login:
          type: string
          description: WordPress username
          example: jsmith
        user_email:
          type: string
          format: email
          description: User email address
          example: jsmith@example.com
        granted_at:
          type: string
          format: date-time
          description: "Timestamp when access was granted"
          example: "2026-03-10T08:00:00Z"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: "Optional ISO 8601 expiration timestamp. Null = permanent grant."
          example: "2026-12-31T23:59:59Z"
        is_expired:
          type: boolean
          description: "Computed: true if expires_at is in the past"

    AccessRequest:
      type: object
      description: A pending access request submitted by a non-authenticated visitor.
      required: [id, token, campaign_id, email, status, created_at]
      properties:
        id:
          type: integer
          description: Internal request ID
          example: 1
        token:
          type: string
          format: uuid
          description: UUID v4 token used in approval/denial URLs
          example: 3f2504e0-4f89-11d3-9a0c-0305e82c3301
        campaign_id:
          type: integer
          description: Campaign post ID
          example: 42
        email:
          type: string
          format: email
          description: Requestor's email address
          example: visitor@example.com
        name:
          type: string
          nullable: true
          description: Requestor's name, if provided
          example: Jane Visitor
        message:
          type: string
          nullable: true
          description: Optional message from the requestor
        status:
          type: string
          enum: [pending, approved, denied]
          description: Current status of the request
          example: pending
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the request was submitted
          example: "2026-04-01T12:00:00Z"

    AuditEntry:
      type: object
      description: A single entry in a campaign's audit log.
      required: [id, action, actor_id, actor_login, created_at]
      properties:
        id:
          type: integer
          description: Unique audit entry ID
          example: 501
        action:
          type: string
          description: Action string in dot-notation (e.g. media.added, access.granted)
          example: media.added
        actor_id:
          type: integer
          description: WordPress user ID of the user who performed the action
          example: 1
        actor_login:
          type: string
          description: WordPress username of the actor
          example: admin
        data:
          type: object
          description: Arbitrary payload recording what changed (keys vary by action)
          additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when this event occurred
          example: "2026-04-15T11:22:00Z"

    Company:
      type: object
      description: An organisational grouping for campaigns.
      required: [id, name, slug]
      properties:
        id:
          type: integer
          description: Internal company ID
          example: 3
        name:
          type: string
          description: Display name
          example: Acme Corp
        slug:
          type: string
          description: URL-safe identifier
          example: acme-corp

    User:
      type: object
      description: A WordPress user.
      required: [id, login, email]
      properties:
        id:
          type: integer
          description: WordPress user ID
          example: 7
        login:
          type: string
          description: WordPress username
          example: jsmith
        email:
          type: string
          format: email
          description: Email address
          example: jsmith@example.com
        display_name:
          type: string
          description: Display name shown in the UI
          example: John Smith
        roles:
          type: array
          items:
            type: string
          description: WordPress roles assigned to this user
          example: [subscriber]

    Role:
      type: object
      description: A WordPress role with its capabilities.
      required: [name, display_name]
      properties:
        name:
          type: string
          description: Slug / machine name of the role
          example: editor
        display_name:
          type: string
          description: Human-readable label
          example: Editor
        capabilities:
          type: object
          description: Capability map (capability name -> boolean)
          additionalProperties:
            type: boolean

    AnalyticsEvent:
      type: object
      description: A single analytics event recorded by the embedded gallery.
      required: [campaign_id, event_type]
      properties:
        campaign_id:
          type: integer
          description: Campaign post ID
          example: 42
        event_type:
          type: string
          enum: [view, lightbox_open, video_play]
          description: Type of interaction
          example: view
        session_id:
          type: string
          format: uuid
          description: Client-generated UUID v4 session identifier
          example: 3f2504e0-4f89-11d3-9a0c-0305e82c3301
        media_id:
          type: string
          nullable: true
          description: ID of the specific media item involved (for lightbox/video events)
          example: abc123.jpg

    AnalyticsDailyPoint:
      type: object
      required: [date, views, unique_visitors]
      properties:
        date:
          type: string
          format: date
          example: "2026-04-01"
        views:
          type: integer
          example: 120
        unique_visitors:
          type: integer
          example: 84

    AnalyticsSummary:
      type: object
      description: Analytics summary for a campaign over a date range.
      required: [campaign_id, period_start, period_end, total_views, unique_visitors]
      properties:
        campaign_id:
          type: integer
          example: 42
        period_start:
          type: string
          format: date
          example: "2026-04-01"
        period_end:
          type: string
          format: date
          example: "2026-04-30"
        total_views:
          type: integer
          example: 3200
        unique_visitors:
          type: integer
          example: 1100
        daily:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsDailyPoint'

    LayoutTemplate:
      type: object
      description: A reusable layout template that defines gallery slot configuration.
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
          description: Unique template identifier (UUID v4)
          example: 3f2504e0-4f89-11d3-9a0c-0305e82c3301
        name:
          type: string
          description: Human-readable template name
          example: Classic 3-Column Grid
        slots:
          type: array
          description: Array of slot configuration objects
          items:
            type: object
            additionalProperties: true
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-01-10T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-22T15:45:00Z"

    OverlayItem:
      type: object
      description: An image file stored in the overlay library.
      required: [id, url, name, mime_type]
      properties:
        id:
          type: string
          format: uuid
          description: Unique overlay identifier (UUID v4)
          example: 3f2504e0-4f89-11d3-9a0c-0305e82c3301
        url:
          type: string
          format: uri
          description: Public URL of the overlay image
          example: https://example.com/wp-content/uploads/wpsg/overlays/frame.png
        name:
          type: string
          description: Original filename
          example: frame.png
        mime_type:
          type: string
          description: MIME type
          example: image/png
        size:
          type: integer
          description: File size in bytes
          example: 45231

    FontItem:
      type: object
      description: A font file stored in the font library.
      required: [id, url, family, filename]
      properties:
        id:
          type: string
          format: uuid
          description: Unique font identifier (UUID v4)
          example: 3f2504e0-4f89-11d3-9a0c-0305e82c3301
        url:
          type: string
          format: uri
          description: Public URL of the font file
          example: https://example.com/wp-content/uploads/wpsg/fonts/custom.woff2
        family:
          type: string
          description: CSS font-family name
          example: Custom Sans
        filename:
          type: string
          description: Original filename
          example: custom-sans.woff2
        size:
          type: integer
          description: File size in bytes
          example: 85000
          nullable: true

    Settings:
      type: object
      description: Flat key/value map of plugin settings.
      additionalProperties: true
      properties:
        loginMinPasswordLength:
          type: integer
          description: Minimum password length enforced at the login form
          example: 6
        defaultVisibility:
          type: string
          enum: [public, private]
          example: public
        enableAnalytics:
          type: boolean
          example: true
        enableAccessRequests:
          type: boolean
          example: true

    HealthData:
      type: object
      description: Plugin and environment health diagnostics.
      required: [version, wp_version, php_version]
      properties:
        version:
          type: string
          description: Plugin version
          example: 0.24.0
        wp_version:
          type: string
          description: WordPress core version
          example: "6.7"
        php_version:
          type: string
          description: PHP runtime version
          example: "8.2.10"
        db_version:
          type: string
          description: MySQL/MariaDB version string
          example: "8.0.32"
        cache_driver:
          type: string
          description: Active object cache driver (or "none")
          example: redis
        table_checks:
          type: array
          description: Status of each custom DB table
          items:
            type: object
            required: [table, ok]
            properties:
              table:
                type: string
              ok:
                type: boolean
        expiredGrantsPendingCleanup:
          type: integer
          description: "P28-B: Number of access grants whose expires_at has passed but have not yet been removed by the daily WP-Cron job. A non-zero value indicates the cron job is lagging."
          example: 0

    ThumbnailCacheStats:
      type: object
      description: Statistics for the server-side thumbnail cache.
      required: [count, total_size_bytes]
      properties:
        count:
          type: integer
          description: Number of cached entries
          example: 240
        total_size_bytes:
          type: integer
          description: Total disk space used by the cache in bytes
          example: 5242880
        oldest_entry:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the oldest cache entry
          example: "2025-09-01T00:00:00Z"
        newest_entry:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recently added cache entry
          example: "2026-05-01T08:30:00Z"

    OembedResponse:
      type: object
      description: Proxied oEmbed discovery response.
      required: [url, html]
      properties:
        url:
          type: string
          format: uri
          description: The original URL that was resolved
          example: https://www.youtube.com/watch?v=dQw4w9WgXcQ
        html:
          type: string
          description: Embed HTML returned by the oEmbed provider
        width:
          type: integer
          nullable: true
          example: 640
        height:
          type: integer
          nullable: true
          example: 360
        provider_name:
          type: string
          nullable: true
          example: YouTube
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          example: https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg

security:
  - {}

paths:

  # ── Auth ──────────────────────────────────────────────────────────────

  /wp-json/wp-super-gallery/v1/auth/login:
    post:
      operationId: cookieLogin
      tags: [Auth]
      summary: Cookie-based login
      description: |
        Authenticates with WordPress using username/password and sets the
        session cookie. Returns a fresh X-WP-Nonce value for subsequent
        authenticated requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                remember:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Logged in. Save the nonce value as X-WP-Nonce.
          content:
            application/json:
              schema:
                type: object
                required: [user_id, user_login, display_name, nonce, roles]
                properties:
                  user_id:
                    type: integer
                    example: 1
                  user_login:
                    type: string
                    example: admin
                  display_name:
                    type: string
                    example: Administrator
                  nonce:
                    type: string
                    example: 1ab2c3d4e5
                  roles:
                    type: array
                    items:
                      type: string
                    example: [administrator]
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wp-json/wp-super-gallery/v1/auth/logout:
    post:
      operationId: cookieLogout
      tags: [Auth]
      summary: Cookie-based logout
      description: Clears the WordPress session cookie. Accepts cookie or bearer auth.
      security:
        - cookieNonce: []
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wp-json/wp-super-gallery/v1/nonce:
    get:
      operationId: refreshNonce
      tags: [Auth]
      summary: Refresh REST nonce
      description: |
        Returns a fresh wp_rest nonce. Use to refresh a stale X-WP-Nonce header
        in long-running SPA sessions. Accepts cookie or bearer auth.
      security:
        - cookieNonce: []
        - bearerAuth: []
      responses:
        '200':
          description: Fresh nonce string
          content:
            application/json:
              schema:
                type: object
                required: [nonce]
                properties:
                  nonce:
                    type: string
                    example: 1ab2c3d4e5
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Permissions ───────────────────────────────────────────────────────

  /wp-json/wp-super-gallery/v1/permissions:
    get:
      operationId: getPermissions
      tags: [Auth]
      summary: Get current user permissions
      description: Returns a flat capability map for the currently authenticated user.
      security:
        - cookieNonce: []
        - bearerAuth: []
      responses:
        '200':
          description: Capability map
          content:
            application/json:
              schema:
                type: object
                required: [can_manage_wpsg, can_upload_files, can_manage_options, user_id, roles]
                properties:
                  can_manage_wpsg:
                    type: boolean
                  can_upload_files:
                    type: boolean
                  can_manage_options:
                    type: boolean
                  user_id:
                    type: integer
                    example: 1
                  roles:
                    type: array
                    items:
                      type: string
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Settings ──────────────────────────────────────────────────────────

  /wp-json/wp-super-gallery/v1/settings:
    get:
      operationId: getPublicSettings
      tags: [Settings]
      summary: Get public settings
      description: Public endpoint (rate_limit_public). Returns the subset of settings safe for unauthenticated callers.
      security:
        - {}
      responses:
        '200':
          description: Settings object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: updateSettings
      tags: [Settings]
      summary: Update settings (partial)
      description: Only the keys present in the request body are updated. Requires manage_options.
      security:
        - bearerAuth: []
        - cookieNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: Full updated settings object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400':
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error - per-field details in data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Campaigns ─────────────────────────────────────────────────────────

  /wp-json/wp-super-gallery/v1/campaigns:
    get:
      operationId: listCampaigns
      tags: [Campaigns]
      summary: List campaigns
      description: |
        Paginated campaign list. Unauthenticated callers see only public/publish
        campaigns. Admin callers also see private and draft campaigns.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: per_page
          schema:
            type: integer
            default: 20
        - in: query
          name: status
          schema:
            type: string
            enum: [publish, draft, archived]
