          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /wp-json/wp-super-gallery/v1/admin/layout-templates/{templateId}:
    parameters:
      - in: path
        name: templateId
        required: true
        description: UUID v4 string identifier of the layout template
        schema:
          type: string
          format: uuid
    get:
      operationId: getLayoutTemplate
      tags: [LayoutTemplates]
      summary: Get layout template (admin)
      security:
        - bearerAuth: []
        - cookieNonce: []
      responses:
        '200':
          description: Full layout template including slots array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutTemplate'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: updateLayoutTemplate
      tags: [LayoutTemplates]
      summary: Update layout template
      security:
        - bearerAuth: []
        - cookieNonce: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slots:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  nullable: true
      responses:
        '200':
          description: Updated template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutTemplate'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteLayoutTemplate
      tags: [LayoutTemplates]
      summary: Delete layout template
      description: |
        Permanently deletes the template. Campaigns linked to this template
        will have their template_id set to null (no cascade).
      security:
        - bearerAuth: []
        - cookieNonce: []
      responses:
        '200':
          description: Template deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Template deleted
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Template is in use by active campaigns (if enforced)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

