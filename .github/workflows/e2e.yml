# ──────────────────────────────────────────────────────────────────────────────
# WP Super Gallery — End-to-End Tests (manual trigger)
#
# Runs Playwright E2E tests against a full wp-env WordPress instance.
# Triggered manually via workflow_dispatch — not part of the regular CI gate
# because it requires a heavyweight Docker environment.
# ──────────────────────────────────────────────────────────────────────────────

name: E2E Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start wp-env
        run: npx wp-env start

      - name: Build and deploy assets
        run: npm run build:wp

      - name: Run Playwright tests
        run: npx playwright test --retries=2
        env:
          E2E_BASE_URL: http://localhost:8889

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 14
